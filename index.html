<style>
/* ============================================================
   SILO 3 — PRÉSENTATION : tokens isolés.
   Design system « Mission Hyrox Pro » branché ici (dark-first,
   jaune signature). Silos 1 (données) et 2 (formules) : intacts.
   ============================================================ */
:root{
  /* --- Tokens bruts du design system (charte) --- */
  --hx-yellow:#F2EA00; --hx-yellow-bright:#FFF52E; --hx-yellow-deep:#C9C200; --hx-black:#0A0A0A;
  --hx-ink-900:#050505; --hx-ink-850:#0C0D0E; --hx-ink-800:#121316; --hx-ink-700:#1A1C20;
  --hx-ink-600:#24272C; --hx-ink-500:#34383F; --hx-ink-400:#4A4F57; --hx-ink-300:#6B7178;
  --hx-ink-200:#969CA4; --hx-ink-100:#C7CCD2; --hx-ink-050:#EAECEF; --hx-white:#FFFFFF;
  --hx-lime:#B6F500; --hx-cyan:#2BD9D2; --hx-orange:#FF7A1A; --hx-red:#FF3B47; --hx-violet:#9B7CFF; --hx-green:#2FD27A;
  --font-display:'Barlow Condensed','Arial Narrow',sans-serif;
  --font-body:'Barlow',system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,'SF Mono',monospace;

  /* --- Mapping vers les noms déjà utilisés par le dashboard --- */
  --bg:var(--hx-ink-900); --surface:var(--hx-ink-700); --line:var(--hx-ink-600);
  --txt:var(--hx-ink-050); --dim:var(--hx-ink-100); --hint:var(--hx-ink-200);
  --ok:var(--hx-green); --warn:var(--hx-orange); --bad:var(--hx-red);
  --accent:var(--hx-yellow); --target:var(--hx-cyan); --real:var(--hx-orange);
  --track:var(--hx-ink-600);              /* fond des barres / jauges */
  --radius:14px; --maxw:460px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--txt);
  font-family:var(--font-body);
  font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
svg text{font-family:var(--font-mono)}
.wrap{max-width:var(--maxw);margin:0 auto;background:var(--bg);min-height:100vh}
header{position:sticky;top:0;z-index:10;background:var(--bg);
  border-bottom:1px solid var(--line);padding:10px 14px 0}
.brand{font-size:13px;color:var(--dim);margin:0 0 8px}
.brand b{color:var(--accent);font-family:var(--font-display);font-weight:700;
  text-transform:uppercase;letter-spacing:.06em}
.tabs{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:none;font-family:var(--font-display);font-size:15px;text-transform:uppercase;
  letter-spacing:.06em;padding:7px 11px;border:none;background:none;
  color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}
.swiper{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;
  scrollbar-width:none}
.swiper::-webkit-scrollbar{display:none}
.page{flex:0 0 100%;scroll-snap-align:start;padding:14px;min-width:100%}
h2{display:none}                         /* titres de page masqués (l'onglet actif fait office de titre) */
.page{padding-top:10px}                  /* court espace au-dessus du 1er encadré */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:13px 14px;margin-bottom:12px}
.card .lbl{font-size:11px;color:var(--hint);margin:0 0 8px;text-transform:uppercase;letter-spacing:.12em;font-weight:600}
.muted{font-size:12px;color:var(--hint);line-height:1.45}
/* feux */
.row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.dot{width:9px;height:9px;border-radius:50%;flex:none;background:var(--hint)}
.dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)} .dot.bad{background:var(--bad)}
.row .nm{flex:1;font-size:14px}
.row .nm small{color:var(--hint);font-size:12px}
.pill{font-family:var(--font-mono);font-size:12px;padding:3px 9px;border-radius:var(--radius-sm,6px);
  background:var(--track);color:var(--dim);white-space:nowrap}
.verdict{background:var(--hx-ink-800);border:1px solid var(--line);border-left:3px solid var(--accent);
  border-radius:var(--radius);padding:11px 13px;font-size:13px;color:var(--dim);margin-bottom:12px}
.verdict b{color:var(--txt)}
/* jauges */
.gauges{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.gauge{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:12px;text-align:center}
.gauge .gn{font-family:var(--font-display);text-transform:uppercase;letter-spacing:.05em;
  font-size:14px;font-weight:700;margin:6px 0 2px}
.gauge .gs{font-size:11px;color:var(--hint);line-height:1.35}
/* barres de zones */
.zbar{display:flex;height:10px;border-radius:5px;overflow:hidden;margin:8px 0 4px;background:var(--track)}
.zleg{display:flex;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--dim)}
.zleg i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:3px;vertical-align:-1px}
/* charge par thème */
.theme{display:flex;align-items:center;gap:8px;margin:7px 0;font-size:13px}
.theme .tn{width:62px;color:var(--dim);font-size:12px}
.theme .tt{flex:1;height:9px;border-radius:5px;background:var(--track);overflow:hidden}
.theme .tt span{display:block;height:100%;background:var(--accent)}
.theme .tv{width:34px;text-align:right;color:var(--dim);font-size:12px;font-family:var(--font-mono)}
table.refs{width:100%;font-size:13px;border-collapse:collapse}
table.refs td{padding:6px 0;border-bottom:1px solid var(--line)}
table.refs td:last-child{text-align:right;color:var(--txt);font-family:var(--font-mono);font-size:12px}
.amorce{font-size:11px;color:var(--warn);margin-top:6px}
svg{display:block}
</style>

/* libellés modules */
const MOD = { m1:"M1 facile", m2:"M2 seuil", m3:"M3 compromise",

/* ============================================================
   SILO 2 — FORMULES (fonctions pures : entrée → sortie, zéro effet de bord)
   C'est ici que vivront les diagnostics. Testable, remplaçable.
   ============================================================ */
const RESERVE = PROFIL.fcMax - PROFIL.fcRepos;

function ef(s){                                      // efficiency factor, m/min/bpm
  // override possible : EF calculé sur le segment steady (efKm/efMin/efFc), sinon séance entière
  const dist=s.efKm??s.distanceKm, dur=s.efMin??s.dureeMin, fc=s.efFc??s.fcMoy;
  if(!dist || !fc) return null;
  return ((dist*1000)/dur)/fc;
}
function hrr(fc){ return (fc - PROFIL.fcRepos)/RESERVE; }   // % réserve (0–1)

function trimp(s){                                   // Banister, pondéré exponentiel
  const r = hrr(s.fcMoy);
  return s.dureeMin * r * 0.64 * Math.exp(1.92*r);
}
function ewma(series, tau){                          // moyenne mobile exponentielle
  const lambda = 1 - Math.exp(-1/tau);
  let v = 0; const out = [];
  for(const x of series){ v = v + (x - v)*lambda; out.push(v); }
  return out;
}
function dailyLoad(sessions, from, to){              // TRIMP agrégé par jour
  const days = []; const d = new Date(from);
  while(d <= to){ days.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1); }
  return days.map(day => {
    let load = 0;
    for(const s of sessions) if(s.date===day) load += trimp(s);
    return { day, load };
  });
}
function pmc(sessions){                              // CTL(42j)=fitness, ATL(7j)=fatigue, TSB=forme
  if(!sessions.length) return null;
  const from = new Date(sessions[0].date);
  const series = dailyLoad(sessions, from, AUJ);
  const loads = series.map(x=>x.load);
  const ctl = ewma(loads,42), atl = ewma(loads,7);
  const i = series.length-1;
  return { series, ctl, atl,
    fitness:ctl[i], fatigue:atl[i], forme:ctl[i]-atl[i],
    fiable: series.length >= 28 && sessions.length >= 12 };  // honnête : 4 sem ET assez dense
}
function acwr(sessions){                              // aigu 7j : chronique 28j
  const a = dailyLoad(sessions, new Date(AUJ.getTime()-6*864e5), AUJ)
            .reduce((s,x)=>s+x.load,0)/7;
  const c = dailyLoad(sessions, new Date(AUJ.getTime()-27*864e5), AUJ)
            .reduce((s,x)=>s+x.load,0)/28;
  const joursData = (AUJ - new Date(sessions[0].date))/864e5;
  const nb28 = sessions.filter(s=>(AUJ - new Date(s.date))/864e5 <= 27).length;
  return { ratio: c>0 ? a/c : null, fiable: joursData >= 28 && nb28 >= 8 };  // besoin d'un socle chronique dense, pas juste 28 j d'ancienneté
}
function chargeParTheme(sessions){                   // TRIMP groupé par module (via tag type)
  const out = {};
  for(const s of sessions){ out[s.type] = (out[s.type]||0) + trimp(s); }
  return out;
}
function coursePoints(){                              // EF de chaque footing, en semaines depuis le départ
  if(!SESSIONS.length) return [];
  const start = new Date(SESSIONS.reduce((m,s)=> s.date<m?s.date:m, SESSIONS[0].date));
  return SESSIONS.filter(s=>s.tags && s.tags.includes("steady") && s.distanceKm && ef(s)!=null)
    .map(s=>({ week:(new Date(s.date)-start)/(7*864e5), ef:ef(s), date:s.date }))
    .sort((a,b)=>a.week-b.week);
}
function dernierSeuil(){                              // dernier test de seuil loggé
  return TESTS.filter(t=>t.type==="seuil").slice(-1)[0] || null;
}
function dernierDecouplage(){                          // dernière séance avec dérive Pa:HR mesurée
  return SESSIONS.filter(s=>s.decouplagePct!=null).sort((a,b)=>a.date<b.date?1:-1)[0] || null;
}

function repereM1(){ return SESSIONS.find(x=>x.type==="m1" && x.distanceKm); }  // séance de course = repère EF

/* anneau de jauge SVG : value=null → calibration (anneau neutre) */
function ringSVG(value){
  const r=30, c=2*Math.PI*r, off = value==null ? c : c*(1-value);
  const col = value==null ? "var(--line)" : "var(--accent)";
  const dash = value==null ? "4 6" : "none";
  const center = value==null ? "—" : Math.round(value*100)+"%";
  return `<svg viewBox="0 0 80 80" width="78" height="78">
    <circle cx="40" cy="40" r="${r}" fill="none" stroke="var(--line)" stroke-width="7"/>
    <circle cx="40" cy="40" r="${r}" fill="none" stroke="${col}" stroke-width="7"
      stroke-dasharray="${dash==="none"?c:dash}" stroke-dashoffset="${dash==="none"?off:0}"
      stroke-linecap="round" transform="rotate(-90 40 40)"/>
    <text x="40" y="45" text-anchor="middle" font-size="15" font-weight="600" fill="var(--txt)">${center}</text>
  </svg>`;
}
function gauge(name, value, sub){
  return `<div class="gauge">${ringSVG(value)}
    <div class="gn">${name}</div><div class="gs">${sub}</div></div>`;
}

function renderGlobal(){
  const p = pmc(SESSIONS), a = acwr(SESSIONS);
  const themeG = chargeParTheme(SESSIONS);
  const totalG = Object.values(themeG).reduce((x,y)=>x+y,0);
  const domG = Object.entries(themeG).sort((x,y)=>y[1]-x[1])[0] || ["",0];
  const domLabel = MOD[domG[0]] || domG[0];
  const domShare = totalG ? Math.round(domG[1]/totalG*100) : 0;
  const formeState = p && p.fiable ? (p.forme>=-10?"ok":"warn") : "";
  const formePill  = p && p.fiable ? (p.forme>=0?"frais":"chargé") : "amorçage";
  const acwrPill   = a.fiable ? fmt(a.ratio,2) : "calibration";
  const dd = dernierDecouplage();
  const durState = dd ? (dd.decouplagePct < CIBLES.decouplagePct ? "ok" : "warn") : "";
  const durPill  = dd ? fmt(dd.decouplagePct,1)+"%" : "à mesurer";
  return `
  <h2>Vue globale</h2>
  <div class="verdict">${SESSIONS.length} séances loggées · charge la plus lourde : <b>${domLabel}</b> (${domShare}%). Décrochage aérobie déjà mesuré le 25/06 (<b>${dd?fmt(dd.decouplagePct,1):"—"}%</b>, sous la cible). Prochaine donnée structurante : <b>PFT T1</b> + <b>test seuil calibré</b> (conditions neutres).</div>
  <div class="card">
    <p class="lbl">Décision du jour — 3 feux</p>
    <div class="row"><span class="dot ${durState}"></span>
      <span class="nm">Durabilité <small>· décrochage</small></span>
      <span class="pill">${durPill}</span></div>
    <div class="row"><span class="dot ${formeState}"></span>
      <span class="nm">Fraîcheur <small>· forme (TSB)</small></span>
      <span class="pill">${formePill}</span></div>
    <div class="row"><span class="dot"></span>
      <span class="nm">Risque <small>· ACWR</small></span>
      <span class="pill">${acwrPill}</span></div>
  </div>
  <p class="lbl" style="margin:4px 2px 8px;color:var(--dim);font-size:12px">Jauges — % de la cible Pro</p>
  <div class="gauges">
    ${gauge("Global", null, "rollup des 3")}
    ${gauge("Moteur", null, "EF "+fmt(ef(repereM1()),2)+" → cible "+CIBLES.ef)}
    ${gauge("Course", null, "tenir "+CIBLES.allureCourse+" fatigué")}
    ${gauge("Stations", null, "PFT → sub-25 min")}
  </div>
  <p class="muted" style="margin-top:10px">En calibration : une jauge de progression a besoin de
    plusieurs points (et des tests décrochage / PFT) avant d'afficher un %. Formule du dénominateur
    à amender ensemble.</p>
  <div class="card" style="margin-top:12px">
    <p class="lbl">Référence — Open Men Solo · nov. 2025</p>
    <table class="refs">
      <tr><td>FC moyenne course</td><td>${REFERENCE_OPEN.fcMoy} bpm</td></tr>
      <tr><td>Temps en Z4+</td><td>${REFERENCE_OPEN.pctZ4plus}%</td></tr>
      <tr><td>Charge (TRIMP)</td><td>${REFERENCE_OPEN.trimp}</td></tr>
      <tr><td>Dérive cardiaque (8 runs)</td><td>+${REFERENCE_OPEN.deriveBpm} bpm</td></tr>
    </table>
    <p class="muted" style="margin-top:8px">${REFERENCE_OPEN.notes}</p>
  </div>`;
}

function renderCharge(){
  const p = pmc(SESSIONS);
  const theme = chargeParTheme(SESSIONS);
  const total = Object.values(theme).reduce((a,b)=>a+b,0);
  const themeRows = Object.entries(theme).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
    <div class="theme"><span class="tn">${MOD[k]||k}</span>
      <span class="tt"><span style="width:${Math.round(v/total*100)}%"></span></span>
      <span class="tv">${Math.round(v)}</span></div>`).join("");
  return `
  <h2>Charge &amp; forme</h2>
  <div class="card">
    <p class="lbl">PMC — fitness / fatigue / forme</p>
    ${pmcChartSVG(p)}
    <table class="refs" style="margin-top:8px">
      <tr><td>Fitness (CTL, 42j)</td><td>${fmt(p.fitness,1)}</td></tr>
      <tr><td>Fatigue (ATL, 7j)</td><td>${fmt(p.fatigue,1)}</td></tr>
      <tr><td>Forme (TSB = fitness − fatigue)</td><td>${fmt(p.forme,1)}</td></tr></table>
    <p class="amorce">⚠ Amorçage — valeurs absolues fiables après ~4 semaines d'accumulation.</p>
  </div>
  <div class="card">
    <p class="lbl">Charge par thème (TRIMP) — ce qu'on a bossé</p>
    ${themeRows}
    <p class="muted" style="margin-top:8px">Base du moteur d'orientation : croisé aux jauges,
      il pointera le thème faible <i>et</i> sous-investi à prioriser.</p>
  </div>`;
}

function renderRisque(){

    <p class="muted">${a.fiable ? "Ratio : "+fmt(a.ratio,2)+" (alerte si &gt; 1,5)"
      : "En calibration — besoin de 28 j d'historique. Base de preuve contestée, à lire avec recul."}</p>

  <div class="card">
    <p class="lbl">Mollets excentriques</p>

function renderStrat(){
  const cp = coursePoints();
  const efNow = cp.length ? cp[cp.length-1].ef : null;
  const p = pmc(SESSIONS), a = acwr(SESSIONS);
  const F = s => `<div style="font-family:var(--font-mono);font-size:12px;color:var(--accent);background:var(--hx-ink-800);border:1px solid var(--line);padding:8px 10px;border-radius:8px;margin:6px 0;overflow-x:auto;white-space:pre-wrap;line-height:1.6">${s}</div>`;
  return `
  <h2>Stratégie</h2>
  <div class="verdict">Course <b>Hyrox Pro le 02/10</b>. Le spécifique Hyrox = <b>courir fatigué entre des stations</b> qui chargent fort → l'effort vit surtout en <b>Z3–début Z4</b> (compromis), pas en « 80% facile » classique. Le Z2 reste la base aérobie + la récup. Trois chantiers : <b>durabilité aérobie</b>, <b>endurance de force</b>, <b>tenir l'allure fatigué</b>.</div>

  <div class="card">
    <p class="lbl">Le principe — distribution d'intensité (spécifique Hyrox)</p>
    <p class="muted">En endurance pure, le modèle classique est polarisé : ~80% facile, ~20% dur. <b>Hyrox déroge</b> : l'épreuve se court en <b>Z3 à début Z4</b> — allure de compromis sous fatigue, entre le stress métabolique des stations et l'impact mécanique. Le gros du travail <b>spécifique</b> vit donc dans cette bande, pas dans le facile. Le Z2 garde un rôle clé mais minoritaire : entretenir le moteur aérobie et <b>récupérer</b> entre les grosses séances. Le Z5 franc reste rare. Concrètement : tes WOD/HIIT + course fatiguée = le cœur du spécifique (Z3–Z4) ; tes footings EF = la base aérobie en Z2.</p>
  </div>

  <div class="card">
    <p class="lbl">EF — efficacité aérobie · chantier n°1</p>
    ${F("EF = (distance_m ÷ durée_min) ÷ FC_moy")}
    <p class="muted">Mètres parcourus par battement de cœur. À FC égale, un EF qui monte = moteur plus efficace. Cible <b>${CIBLES.ef}</b> · actuel <b>${fmt(efNow,3)}</b>. On veut voir la courbe rejoindre la bande +4 à +7% d'ici 14 semaines.</p>
  </div>

  <div class="card">
    <p class="lbl">Décrochage aérobie (Pa:HR) — durabilité</p>
    ${F("décrochage % = (EF_1ère moitié − EF_2ᵉ moitié) ÷ EF_1ère moitié × 100")}
    <p class="muted">Sur un effort long à allure constante, mesure la dérive du cœur. Si la FC grimpe alors que l'allure ne bouge pas, la base aérobie lâche. Cible <b>&lt; ${CIBLES.decouplagePct}%</b> (idéal &lt; 5%). Déjà mesuré le 25/06 : <b>4,0%</b> (sous la cible). Prochain point : test seuil calibré en conditions neutres.</p>
  </div>

  <div class="card">
    <p class="lbl">TRIMP — la charge d'une séance</p>
    ${F("TRIMP = durée_min × HRr × 0,64 × e^(1,92 × HRr)\nHRr = (FC_moy − " + PROFIL.fcRepos + ") ÷ " + RESERVE)}
    <p class="muted">Le coût d'une séance = durée pondérée par l'intensité. La pondération est <b>exponentielle</b> : une minute à 175 bpm pèse bien plus qu'une minute à 130. C'est la brique de base de toutes les courbes de charge.</p>
  </div>

  <div class="card">
    <p class="lbl">PMC — fitness / fatigue / forme</p>
    ${F("CTL (fitness) = moyenne mobile expo 42 j du TRIMP\nATL (fatigue) = moyenne mobile expo 7 j\nTSB (forme) = CTL − ATL")}
    <p class="muted">La fitness se construit lentement (42 j), la fatigue monte et redescend vite (7 j). Leur écart = la forme. Très négatif = chargé (mauvais jour pour tester) ; proche de 0 ou positif = frais (jour de perf). ${p.fiable ? "Actuel — fitness <b>"+fmt(p.fitness,0)+"</b> · fatigue <b>"+fmt(p.fatigue,0)+"</b> · forme <b>"+fmt(p.forme,0)+"</b>." : "En amorçage tant que l'historique n'est pas assez dense."}</p>
  </div>

  <div class="card">
    <p class="lbl">ACWR — risque de blessure</p>
    ${F("ACWR = charge moyenne 7 j ÷ charge moyenne 28 j")}
    <p class="muted">Compare ce que tu encaisses cette semaine à ton habitude du mois. Zone confortable <b>0,8–1,3</b> ; alerte au-dessus de <b>1,5</b> (montée trop rapide) ; sous 0,8 = sous-charge. ${a.fiable ? "Actuel — <b>"+fmt(a.ratio,2)+"</b>." : "En calibration."} <i>À lire avec recul</i> : indicateur grossier, base de preuve discutée — une alerte parmi d'autres, pas un verdict.</p>
  </div>

  <div class="card">
    <p class="lbl">Le kite — charge croisée</p>
    <p class="muted">Le kite compte dans la charge (TRIMP → fitness/fatigue/ACWR) parce qu'il fatigue vraiment le système. Mais il est <b>exclu de l'EF</b> (ce n'est pas de la course) et n'est pas un stimulus Hyrox. À gérer comme une fatigue de fond — surtout avant les grosses séances.</p>
  </div>

  <div class="card">
    <p class="lbl">Garde-fous — honnêteté de la donnée</p>
    <p class="muted">Tant que la donnée est trop creuse, les indicateurs restent en <b>calibration</b> plutôt que d'afficher un faux chiffre. PMC fiable seulement avec ≥ 28 j <i>et</i> ≥ 12 séances ; ACWR avec ≥ 8 séances sur 28 j. Un chiffre faux est pire que pas de chiffre.</p>
  </div>`;
}

/* --- mini-graphes SVG (offline, zéro dépendance) --- */
function efChartSVG(){
  const W=300,H=150,pad=28;
  const wk=[0,2,4,6,8,10,12,14];
  const lo=[1.149,1.156,1.162,1.169,1.176,1.182,1.189,1.195];
  const hi=[1.149,1.160,1.172,1.183,1.195,1.206,1.218,1.229];
  const pts = coursePoints();                          // footings EF, tracés à leur date
  const yMax=1.24;
  const yMin = pts.length ? Math.min(1.10, Math.min(...pts.map(p=>p.ef))-0.02) : 1.10;
  const X=w=>pad+(Math.max(0,Math.min(14,w))/14)*(W-pad-8);
  const Y=v=>H-22-((Math.max(yMin,Math.min(yMax,v))-yMin)/(yMax-yMin))*(H-22-8);
  const band=[...wk.map((w,i)=>`${X(w)},${Y(hi[i])}`),
    ...wk.map((w,i)=>`${X(w)},${Y(lo[i])}`).reverse()].join(" ");
  const dots = pts.map(p=>`<circle cx="${X(p.week)}" cy="${Y(p.ef)}" r="4" fill="var(--real)"/>`).join("");
  const path = pts.length>1
    ? `<polyline points="${pts.map(p=>`${X(p.week)},${Y(p.ef)}`).join(" ")}" fill="none" stroke="var(--real)" stroke-width="2"/>` : "";
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="150">
    <polygon points="${band}" fill="var(--target)" opacity="0.28"/>
    <line x1="${pad}" y1="${H-22}" x2="${W-8}" y2="${H-22}" stroke="var(--line)"/>
    ${path}${dots}
    <text x="${pad}" y="${H-6}" font-size="10" fill="var(--hint)">0</text>
    <text x="${W-14}" y="${H-6}" font-size="10" fill="var(--hint)">14 sem</text>
    <text x="2" y="${Y(1.24)+4}" font-size="10" fill="var(--hint)">1.24</text>
    <text x="2" y="${Y(yMin)}" font-size="10" fill="var(--hint)">${yMin.toFixed(2)}</text>
  </svg>`;
}
function pmcChartSVG(p){
  const W=300,H=120,pad=24;
  const ctl=p.ctl, atl=p.atl, n=ctl.length;
  const all=[...ctl,...atl], max=Math.max(...all,1), min=Math.min(...all,0);
  const X=i=>pad+(i/(n-1||1))*(W-pad-8);
  const Y=v=>H-18-((v-min)/((max-min)||1))*(H-18-8);
  const line=arr=>arr.map((v,i)=>`${X(i)},${Y(v)}`).join(" ");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="120">
    <polyline points="${line(ctl)}" fill="none" stroke="var(--accent)" stroke-width="2"/>
    <polyline points="${line(atl)}" fill="none" stroke="var(--real)" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="${pad}" y="${H-4}" font-size="10" fill="var(--hint)">${p.series[0].day.slice(5)}</text>
    <text x="${W-30}" y="${H-4}" font-size="10" fill="var(--hint)">${p.series[n-1].day.slice(5)}</text>
  </svg>
  <div class="zleg" style="margin-top:4px">
    <span><i style="background:var(--accent)"></i>fitness (CTL)</span>
    <span><i style="background:var(--real)"></i>fatigue (ATL)</span></div>`;
}

/* --- navigation swipe + onglets --- */
const tabsEl = document.getElementById("tabs");
const swiper = document.getElementById("swiper");
/* compte à rebours dynamique : recalculé à chaque ouverture depuis la date réelle */
const jRace = Math.max(0, Math.ceil((RACE - new Date())/864e5));
document.getElementById("brand").innerHTML = `<b>Hyrox Pro — Max</b> · J−${jRace} · phase 2`;
PAGES.forEach((pg,i)=>{
  document.getElementById(pg.id).innerHTML = pg.render();
  const b=document.createElement("button");
  b.className="tab"+(i===0?" on":""); b.textContent=pg.tab;
  b.onclick=()=>swiper.scrollTo({left:i*swiper.clientWidth,behavior:"smooth"});
  tabsEl.appendChild(b);
});
swiper.addEventListener("scroll",()=>{
  const i=Math.round(swiper.scrollLeft/swiper.clientWidth);
  [...tabsEl.children].forEach((t,k)=>t.classList.toggle("on",k===i));
  const at=tabsEl.children[i];
  if(at) tabsEl.scrollTo({left:at.offsetLeft-(tabsEl.clientWidth-at.clientWidth)/2,behavior:"smooth"});
},{passive:true});
</script>
