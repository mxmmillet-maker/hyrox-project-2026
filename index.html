<style>
/* ============================================================
   SILO 3 — PRÉSENTATION : tokens isolés. (inchangé vs V2)
   ============================================================ */
:root{
  --hx-yellow:#F2EA00; --hx-yellow-bright:#FFF52E; --hx-yellow-deep:#C9C200; --hx-black:#0A0A0A;
  --hx-ink-900:#0B1A38; --hx-ink-850:#0C1D3E; --hx-ink-800:#0E2044; --hx-ink-700:#13264C;
  --hx-ink-600:#294776; --hx-ink-500:#34578A; --hx-ink-400:#4A4F57; --hx-ink-300:#6B7178;
  --hx-ink-200:#8CA0C2; --hx-ink-100:#B9C6DC; --hx-ink-050:#EEF2F8; --hx-white:#FFFFFF;
  --hx-lime:#B6F500; --hx-cyan:#2BD9D2; --hx-orange:#FF7A1A; --hx-red:#FF3B47; --hx-violet:#9B7CFF; --hx-green:#2FD27A;
  --font-display:'Oswald','Barlow Condensed','Arial Narrow',sans-serif;
  --font-hero:'Fjalla One','Oswald','Barlow Condensed',sans-serif;
  --font-body:'Barlow',system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,'SF Mono',monospace;
  --bg:var(--hx-ink-900); --surface:var(--hx-ink-700); --line:var(--hx-ink-600);
  --txt:var(--hx-ink-050); --dim:var(--hx-ink-100); --hint:var(--hx-ink-200);
  --ok:var(--hx-green); --warn:var(--hx-orange); --bad:var(--hx-red);
  --accent:#FFFFFF; --target:var(--hx-cyan); --real:var(--hx-orange);
  --track:#223A63;
  --radius:3px; --radius-sm:2px; --maxw:460px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--txt);font-family:var(--font-body);
  font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
svg text{font-family:var(--font-mono)}
.wrap{max-width:var(--maxw);margin:0 auto;background:var(--bg);min-height:100vh}
header{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--line);padding:10px 14px 0}
.brand{font-size:13px;color:var(--dim);margin:0 0 8px}
.brand b{color:var(--accent);font-family:var(--font-display);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.tabs{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:none;font-family:var(--font-display);font-size:15px;text-transform:uppercase;letter-spacing:.06em;
  padding:7px 11px;border:none;background:none;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}
.swiper{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none}
.swiper::-webkit-scrollbar{display:none}
.page{flex:0 0 100%;scroll-snap-align:start;padding:14px;min-width:100%;padding-top:12px}
h2{display:none}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:13px 14px;margin-bottom:12px}
.card .lbl{font-size:11px;color:var(--hint);margin:0 0 8px;text-transform:uppercase;letter-spacing:.12em;font-weight:600}
.muted{font-size:12px;color:var(--hint);line-height:1.45}
.row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.dot{width:9px;height:9px;border-radius:50%;flex:none;background:var(--hint)}
.dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)} .dot.bad{background:var(--bad)}
.row .nm{flex:1;font-size:14px}
.row .nm small{color:var(--hint);font-size:12px}
.pill{font-family:var(--font-mono);font-size:12px;padding:3px 9px;border-radius:var(--radius-sm);background:var(--track);color:var(--dim);white-space:nowrap}
.pill.ok{background:rgba(47,210,122,.15);color:var(--ok)} .pill.warn{background:rgba(255,122,26,.15);color:var(--warn)} .pill.bad{background:rgba(255,59,71,.15);color:var(--bad)}
.verdict{background:var(--hx-ink-800);border:1px solid var(--line);border-radius:var(--radius);padding:11px 13px;font-size:13px;color:var(--dim);margin-bottom:12px}
.verdict b{color:var(--txt)}
/* --- Décision du jour (nouveau, V3) --- */
.today{border-radius:var(--radius);padding:16px 15px 15px;margin-bottom:12px;border:1px solid var(--line);position:relative;overflow:hidden;background:var(--surface)}
.today.go,.today.easy,.today.rest{background:var(--surface)}
.today .scap{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.today .kick,.today .big,.today .sub{position:relative}
.today .kick{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--hint);font-weight:600;margin:0 0 4px}
.today .big{font-family:var(--font-hero);font-size:29px;font-weight:400;text-transform:uppercase;letter-spacing:.015em;line-height:1.02;margin:0 0 6px;color:#fff}
.today .sub{font-size:13px;color:var(--dim);line-height:1.45}
.today .sub b{color:var(--txt)}
/* --- stat trio (nouveau) --- */
.trio{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:11px 10px;text-align:center}
.stat .sv{font-family:var(--font-mono);font-size:19px;font-weight:700;color:var(--txt);line-height:1.1}
.stat .sv small{font-size:12px;color:var(--hint)}
.stat .sl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--hint);margin-top:4px}
.stat .sarrow{font-size:12px;font-weight:700}
.up{color:var(--ok)} .down{color:var(--bad)} .flat{color:var(--hint)}
/* --- timeline phases (nouveau) --- */
.tl{display:flex;flex-direction:column;gap:2px}
.tlp{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;font-size:13px;border:1px solid transparent}
.tlp.now{background:var(--hx-ink-800);border-color:var(--accent)}
.tlp.done{opacity:.5}
.tlp .tln{width:20px;height:20px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:11px;font-weight:700;background:var(--track);color:var(--dim)}
.tlp.now .tln{background:var(--accent);color:#000}
.tlp.done .tln{background:var(--ok);color:#000}
.tlp .tlname{flex:1;color:var(--dim)} .tlp.now .tlname{color:var(--txt);font-weight:600}
.tlp .tldate{font-family:var(--font-mono);font-size:11px;color:var(--hint)}
.zbar{display:flex;height:10px;border-radius:5px;overflow:hidden;margin:8px 0 4px;background:var(--track)}
.zleg{display:flex;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--dim)}
.zleg i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:3px;vertical-align:-1px}
.theme{display:flex;align-items:center;gap:8px;margin:7px 0;font-size:13px}
.theme .tn{width:70px;color:var(--dim);font-size:12px}
.theme .tt{flex:1;height:9px;border-radius:5px;background:var(--track);overflow:hidden}
.theme .tt span{display:block;height:100%;background:var(--accent)}
.theme .tv{width:34px;text-align:right;color:var(--dim);font-size:12px;font-family:var(--font-mono)}
table.refs{width:100%;font-size:13px;border-collapse:collapse}
table.refs td{padding:6px 0;border-bottom:1px solid var(--line)}
table.refs td:last-child{text-align:right;color:var(--txt);font-family:var(--font-mono);font-size:12px}
.amorce{font-size:11px;color:var(--warn);margin-top:6px}
.fx{font-family:var(--font-mono);font-size:12px;color:var(--accent);background:var(--hx-ink-800);border:1px solid var(--line);
  padding:8px 10px;border-radius:8px;margin:6px 0;overflow-x:auto;white-space:pre-wrap;line-height:1.6}
svg{display:block}
</style>
</head>

/* ============================================================
   SILO 2 — FORMULES (fonctions pures : entrée → sortie)
   ============================================================ */
const RESERVE = PROFIL.fcMax - PROFIL.fcRepos;
const J = d => new Date(d);
const jour = d => J(d).toISOString().slice(0,10);
const joursEntre = (a,b) => (J(b)-J(a))/864e5;

function ef(s){
  const dist=s.efKm??s.distanceKm, dur=s.efMin??s.dureeMin, fc=s.efFc??s.fcMoy;
  if(!dist || !fc) return null;
  return ((dist*1000)/dur)/fc;
}
function hrr(fc){ return (fc - PROFIL.fcRepos)/RESERVE; }
function trimp(s){ const r=hrr(s.fcMoy); return s.dureeMin * r * 0.64 * Math.exp(1.92*r); }
/* NOUVEAU V3 : charge sRPE = RPE × durée. Capte la charge mécanique/neuro que le TRIMP (cardiaque) sous-évalue.
   Les RPE sont déjà dans les données → gratuit. Null si pas de RPE (footings faciles, kite). */
function srpe(s){ return s.rpe!=null ? s.rpe * s.dureeMin : null; }

function ewma(series, tau){
  const lambda = 1 - Math.exp(-1/tau);
  let v=0; const out=[];
  for(const x of series){ v = v + (x-v)*lambda; out.push(v); }
  return out;
}
function dailyLoad(sessions, from, to){
  const days=[]; const d=new Date(from);
  while(d<=to){ days.push(jour(d)); d.setDate(d.getDate()+1); }
  return days.map(day=>{
    let load=0; for(const s of sessions) if(s.date===day) load += trimp(s);
    return { day, load };
  });
}
function pmc(sessions){
  if(!sessions.length) return null;
  const from = J(sessions[0].date);
  const series = dailyLoad(sessions, from, AUJ);
  const loads = series.map(x=>x.load);
  const ctl=ewma(loads,42), atl=ewma(loads,7);
  const i=series.length-1;
  return { series, ctl, atl, fitness:ctl[i], fatigue:atl[i], forme:ctl[i]-atl[i],
    fiable: series.length>=28 && sessions.length>=12 };
}
function acwr(sessions){
  const a = dailyLoad(sessions, new Date(AUJ.getTime()-6*864e5), AUJ).reduce((s,x)=>s+x.load,0)/7;
  const c = dailyLoad(sessions, new Date(AUJ.getTime()-27*864e5), AUJ).reduce((s,x)=>s+x.load,0)/28;
  const joursData = joursEntre(sessions[0].date, AUJ);
  const nb28 = sessions.filter(s=>joursEntre(s.date,AUJ)<=27).length;
  return { ratio: c>0 ? a/c : null, fiable: joursData>=28 && nb28>=8 };
}
/* Charge par thème, kite exclu (charge croisée, pas un stimulus Hyrox) — NOUVEAU V3 */
function chargeParTheme(sessions){
  const out={};
  for(const s of sessions){ if(s.type==="kite") continue; out[s.type]=(out[s.type]||0)+trimp(s); }
  return out;
}
function chargeKite(sessions){ return sessions.filter(s=>s.type==="kite").reduce((a,s)=>a+trimp(s),0); }

/* CORRIGÉ (bug V2) : renvoie la course la PLUS RÉCENTE (pas la première du tableau). */
function repereM1(){
  const m1 = SESSIONS.filter(x=>x.type==="m1" && x.distanceKm);
  return m1.length ? m1[m1.length-1] : null;
}
/* Points EF séparés par condition (outdoor vs tapis/indoor) — évite de mélanger des EF non comparables. */
function coursePoints(condition){
  const start = J(SESSIONS.reduce((m,s)=> s.date<m?s.date:m, SESSIONS[0].date));
  const estTapis = s => s.tags.includes("tapis")||s.tags.includes("indoor");
  return SESSIONS
    .filter(s=>s.tags.includes("steady") && s.distanceKm && ef(s)!=null)
    .filter(s=> condition==="tapis" ? estTapis(s) : !estTapis(s))
    .map(s=>({ week:joursEntre(start,s.date)/7, ef:ef(s), date:s.date }))
    .sort((a,b)=>a.week-b.week);
}
function dernierSeuil(){ return TESTS.filter(t=>t.type==="seuil").slice(-1)[0] || null; }
/* Séances seuil (Z4) et compromise — regroupées in+out car pilotées par la FC. */
function seuilSessions(){ return SESSIONS.filter(s=>s.type==="m2"||(s.tags&&s.tags.includes("seuil"))).sort((a,b)=>a.date<b.date?1:-1); }
function compromiseSessions(){ return SESSIONS.filter(s=>s.type==="m3"||(s.tags&&s.tags.includes("compromise"))).sort((a,b)=>a.date<b.date?1:-1); }
function dernierDecouplage(){
  return SESSIONS.filter(s=>s.decouplagePct!=null).sort((a,b)=>a.date<b.date?1:-1)[0] || null;
}
/* Dernier test de référence PFT (T1…) — séance taguée "pft". Alimente la carte PFT (page Force). */
function dernierPFT(){ return SESSIONS.filter(s=>(s.tags||[]).includes("pft")).sort((a,b)=>a.date<b.date?1:-1)[0] || null; }
/* Format mm:ss depuis une durée en minutes (25,6 → "25:36"). */
function mmss(min){ const s=Math.round(min*60); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }
/* Bornes de la semaine (lun→dim) contenant ref, en chaînes ISO "YYYY-MM-DD" (hi = lundi
   suivant, exclu) → comparaisons de dates sans souci de fuseau. Base commune mollets + bilan. */
function bornesSemaine(ref=AUJ){
  const d=new Date(ref); d.setHours(12,0,0,0);
  const lundi=new Date(d); lundi.setDate(d.getDate()-((d.getDay()+6)%7));
  const iso=x=>x.toISOString().slice(0,10);
  return { lo:iso(lundi), hi:iso(new Date(lundi.getTime()+7*864e5)) };
}
function molletsSemaine(ref=AUJ){
  const {lo,hi}=bornesSemaine(ref);
  return MOLLETS.filter(x=>x>=lo && x<hi).length;
}
function phaseActuelle(ref=AUJ){
  let cur=PHASES[0];
  for(const p of PHASES){ if(J(p.debut) <= ref) cur=p; }
  return cur;
}

/* --- Cockpit "Semaine" : classer le réel, le comparer au template de phase --- */
/* Une séance est DURE si RPE≥8 OU ≥12 min en Z4+Z5 (même règle que seancesDures). */
function estDure(s){ const z=s.zonesMin||{}; return (s.rpe!=null&&s.rpe>=8) || ((z.z4||0)+(z.z5||0))>=12; }
const CAT_LABEL = { facile:"Facile (Z2)", seuil:"Seuil (Z4)", compromise:"Compromise / stations",
  force:"Force / sled / core", croise:"Croisé (kite)", recup:"Récup / mobilité" };
/* Classe par STIMULUS RÉEL : les tags/type explicites priment, sinon on lit la zone reine des
   données. → une séance collective "HIIT/fractionné" est rangée par ce qu'elle a produit. */
function classifieSeance(s){
  const t=s.tags||[];
  if(s.type==="kite"||t.includes("kite")) return "croise";
  if(t.includes("yoga")||t.includes("mobilite")||t.includes("recup")) return "recup";
  if(s.type==="m3"||t.includes("compromise")) return "compromise";
  if(s.type==="m2"||t.includes("seuil")) return "seuil";
  if(s.type==="m6"||t.includes("hiit")||t.includes("emom")||t.includes("wod")||t.includes("stations")) return "compromise";
  if(s.type==="m4"||s.type==="m5"||t.includes("force")||t.includes("sled")||t.includes("renfo")||t.includes("core")) return "force";
  const z=s.zonesMin||{}, z45=(z.z4||0)+(z.z5||0), z3=(z.z3||0), zEasy=(z.z1||0)+(z.z2||0);
  if(z45>=Math.max(8,z3,zEasy)) return "seuil";
  if(z3>=Math.max(8,zEasy)) return "compromise";
  return "facile";
}
function seancesSemaine(ref=AUJ){
  const {lo,hi}=bornesSemaine(ref);
  return SESSIONS.filter(s=>s.date>=lo && s.date<hi).sort((a,b)=>a.date<b.date?-1:1);
}
function bilanSemaine(ref=AUJ){
  const ses=seancesSemaine(ref).map(s=>({ s, cat:classifieSeance(s) }));
  const compte={ facile:0, seuil:0, compromise:0, force:0, croise:0, recup:0 };
  const joursDurs=new Set();
  for(const x of ses){ compte[x.cat]++; if(estDure(x.s)) joursDurs.add(x.s.date); }
  const ph=phaseActuelle(ref), tpl=TEMPLATE_PHASE[ph.n]||{};
  const ordre=["compromise","seuil","force","facile"];   // priorité des trous : le spécifique d'abord
  const trous=ordre.filter(c=>(tpl[c]||0)>compte[c]).map(c=>({ cat:c, manque:(tpl[c]||0)-compte[c] }));
  const dursN=joursDurs.size, dursMax=tpl.dursMax??3;
  return { ph, tpl, ses, compte, trous, dursN, dursMax, exces:dursN>dursMax };
}
/* NOUVEAU V3 — la brique du compagnon : "quoi faire aujourd'hui + suis-je frais ?".
   Heuristique honnête et simple : compte les grosses piqûres qualité récentes. */
function seancesDures(sessions, jours, ref=AUJ){
  return sessions.filter(s=>{
    const d = joursEntre(s.date, ref);
    if(d<0 || d>jours) return false;
    const z45 = (s.zonesMin?(s.zonesMin.z4||0)+(s.zonesMin.z5||0):0);
    return (s.rpe!=null && s.rpe>=8) || z45>=12;   // dur = RPE≥8 OU ≥12 min en Z4+Z5
  });
}
/* Programme concret par STIMULUS manquant (aligné cockpit Semaine / Plan v3). */
const PROG_CAT = {
  compromise:"Course compromise — 500 m allure course → 1 station poids course → 500 m, SANS pause.",
  seuil:"Seuil M2 — 4×1 km à l'allure seuil (4'55/km), récup 90 s.",
  force:"Force / sled — pushes lourds courts + hinge KB + mollets excentriques.",
  facile:"Footing Z2 facile 30-40 min (plafond 152 bpm).",
  recup:"Mobilité / yoga — décharge active."
};
const CAT_LBL = { compromise:"compromise", seuil:"seuil", force:"force", facile:"facile", recup:"récup" };
/* Prochain entraînement = "reste à faire cette semaine ?".
   Lit bilanSemaine() (trous priorisés vs template de phase) puis module par la FRAÎCHEUR :
   si charge qualité récente, on ne pousse pas une séance dure — on propose le trou DOUX ou du repos. */
function prochainEntrainement(ref=AUJ){
  const b = bilanSemaine(ref);
  const dures3 = seancesDures(SESSIONS,3,ref), dures1 = seancesDures(SESSIONS,1,ref);
  const frais = !(dures1.length>=1 || dures3.length>=2);
  const easy  = dures3.length===1;
  const resteTxt = b.trous.length
    ? b.trous.map(t=>CAT_LBL[t.cat]+(t.manque>1?" ×"+t.manque:"")).join(" · ")
    : "Semaine bouclée ✓";
  const excesTxt = b.exces ? ` ⚠ ${b.dursN}/${b.dursMax} jours durs (excès — pas de nouvelle grosse charge).` : "";
  let mode, prog, note;
  if(!frais){
    mode="rest";
    const doux = b.trous.find(t=>t.cat==="facile"||t.cat==="recup");
    prog = doux ? PROG_CAT[doux.cat] : "Repos complet ou Z2 très facile (plafond 152 bpm).";
    note = `${dures3.length} grosse(s) piqûre(s) qualité en 3 j — on ne s'empile pas.${excesTxt}`;
  } else if(!b.trous.length){
    mode="go"; prog="Cibles de la phase couvertes — bonus facile/mobilité ou repos choisi.";
    note = `Toutes les cibles de la phase ${b.ph.n} sont remplies.${excesTxt}`;
  } else {
    const c = b.trous[0];
    const dur = (c.cat==="compromise"||c.cat==="seuil");
    mode = (easy && dur) ? "easy" : "go";
    prog = PROG_CAT[c.cat];
    note = (easy && dur)
      ? `Priorité ${CAT_LBL[c.cat]} — 1 séance dure il y a 2-3 j, garde-la si tu te sens frais, sinon décale d'1 j.${excesTxt}`
      : `Priorité de la semaine : ${CAT_LBL[c.cat]}. Jours durs ${b.dursN}/${b.dursMax}.${excesTxt}`;
  }
  return { mode, resteTxt, prog, note, ph:b.ph };
}

/* ============================================================
   SILO 3 — RENDU (une fonction par page)
   ============================================================ */
const PAGES = [
  {id:"p-jour",   tab:"Aujourd'hui", render:renderJour},
  {id:"p-semaine",tab:"Semaine",     render:renderSemaine},
  {id:"p-course", tab:"Course",      render:renderCourse},
  {id:"p-dura",   tab:"Durabilité",  render:renderDura},
  {id:"p-charge", tab:"Charge",      render:renderCharge},
  {id:"p-force",  tab:"Force",       render:renderForce},
  {id:"p-plan",   tab:"Plan",        render:renderPlan}
];

function fmt(n,d=2){ return n==null||isNaN(n) ? "—" : Number(n).toFixed(d); }
function allurePace(km,min){ const s=min/km*60; return Math.floor(s/60)+"'"+String(Math.round(s%60)).padStart(2,"0"); }

/* ---------- PAGE 1 : AUJOURD'HUI (compagnon) ---------- */
function renderJour(){
  const dj = prochainEntrainement();
  const ph = phaseActuelle();
  const p = pmc(SESSIONS), a = acwr(SESSIONS);

  // stat 1 : EF actuel (course la plus récente) + tendance vs course précédente même condition
  const s = repereM1();
  const efNow = s?ef(s):null;
  const outdoor = coursePoints("outdoor");
  const trend = outdoor.length>=2 ? outdoor[outdoor.length-1].ef - outdoor[outdoor.length-2].ef : null;
  const arrow = trend==null?"":(trend>0.005?"<span class='sarrow up'>▲</span>":trend<-0.005?"<span class='sarrow down'>▼</span>":"<span class='sarrow flat'>▬</span>");

  // stat 2 : découplage

  // feux de risque
  const acwrVal = a.fiable ? a.ratio : null;
  const acwrCls = acwrVal==null?"":(acwrVal>1.5?"bad":acwrVal>=0.8&&acwrVal<=1.3?"ok":"warn");
  const acwrTxt = acwrVal==null?"calibration":fmt(acwrVal,2);

  // mollets excentriques — compteur hebdo calculé (cible 3/sem)
  const molCnt = molletsSemaine();
  const molOk = molCnt>=3;

  return `
  <div class="today ${dj.mode}">
    <svg class="scap" viewBox="0 0 340 165" preserveAspectRatio="none" aria-hidden="true"><path d="M0,-2 L170,88 L340,-2 L340,44 L170,134 L0,44 Z" fill="#ffffff" opacity="0.11"/><path d="M0,-2 L170,88 L340,-2" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.20"/><path d="M0,44 L170,134 L340,44" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.20"/></svg>
    <p class="kick">Reste à faire cette semaine · Phase ${ph.n} — ${ph.lieu}</p>
    <p class="big">${dj.resteTxt}</p>
    <p class="sub">→ <b>${dj.prog}</b><br><span style="color:var(--hint)">${dj.note}</span></p>
  </div>

  <div class="trio">
    <div class="stat"><div class="sv">${fmt(efNow,3)} ${arrow}</div><div class="sl">EF actuel</div></div>
    <div class="stat"><div class="sv">${dd?fmt(dd.decouplagePct,1)+"<small>%</small>":"—"}</div><div class="sl">Découplage</div></div>
    <div class="stat"><div class="sv ${formeCls}">${formeTxt}</div><div class="sl">Forme (TSB)</div></div>
  </div>

  <div class="card">
    <p class="lbl">Feux — avant de charger</p>
    <div class="row"><span class="dot ${durOk?"ok":dd?"warn":""}"></span>
      <span class="nm">Durabilité <small>· découplage aérobie</small></span>
      <span class="pill ${durOk?"ok":dd?"warn":""}">${dd?fmt(dd.decouplagePct,1)+"% ":"à mesurer"}</span></div>
    <div class="row"><span class="dot ${formeCls==="up"?"ok":formeCls==="down"?"bad":"warn"}"></span>
      <span class="nm">Fraîcheur <small>· forme TSB</small></span>
      <span class="pill">${p.fiable?(p.forme>=0?"frais":"chargé"):"amorçage"}</span></div>
    <div class="row"><span class="dot ${acwrCls}"></span>
      <span class="nm">Risque blessure <small>· ACWR</small></span>
      <span class="pill ${acwrCls}">${acwrTxt}</span></div>
    <div class="row"><span class="dot ${molOk?"ok":"warn"}"></span>
      <span class="nm">Mollets excentriques <small>· sécurité Achille</small></span>
      <span class="pill ${molOk?"ok":"warn"}">${molCnt}/3 sem.</span></div>
  </div>

  <div class="verdict">Cap : <b>Hyrox Pro le 02/10</b> · J−${Math.max(0,Math.ceil(joursEntre(AUJ,RACE)))}. Le spécifique = <b>courir fatigué entre des stations</b> (effort Z3–début Z4), pas « 80% facile ». Trois chantiers : <b>durabilité aérobie</b>, <b>endurance de force</b>, <b>tenir l'allure fatigué</b>.</div>`;
}

    <p class="muted"><b>Pliométrie 2×/sem</b> (sauts, bondissements) + force jambes <b>lourde ≥80% 1RM</b> → +2 à 5% d'économie sur 8-14 sem, <b>sans masse</b>. Les charges moyennes (40-79% 1RM) : effet nul. + confirmer une chaussure à plaque carbone pour la course (Deviate Nitro 3 → +2,5-4% gratuits).</p>
  </div>
  <div class="card">
    <p class="lbl">Sled</p>
    <p class="muted">Pull = technique avant charge (jambes en synchro, pas le dos). Push = entretien, ne jamais laisser le traîneau s'arrêter, micro-pause à mi-longueur.</p>
  </div>
  ${cartePFT()}`;
}
/* Carte PFT — LIT dernierPFT() (plus aucun résultat en dur). Vide → amorce ; rempli → chrono + verdict vs cible. */
function cartePFT(){
  const p = dernierPFT(), cibleSec = CIBLES.pftSec;
  const proto = "1000m / 50 BBJ / 100 fentes / 1000m row / 30 pompes / 100 WB";
  if(!p) return `
  <div class="card">
    <p class="lbl">Endurance stations — PFT (T1)</p>
    <table class="refs">
      <tr><td>${proto}</td><td>—</td></tr>
      <tr><td>Cible</td><td>sub-${mmss(cibleSec/60)} min</td></tr></table>
    <p class="amorce">⚠ T1 à faire — pose le 1ᵉʳ repère stations.</p>
  </div>`;
  const totSec = Math.round(p.dureeMin*60), delta = totSec - cibleSec, ok = delta<=0;
  const verdict = ok ? `sub-${mmss(cibleSec/60)} ✓ · ${mmss(-delta/60)} de marge`
                     : `+${delta}s au-dessus du sub-${mmss(cibleSec/60)}`;
  return `
  <div class="card">
    <p class="lbl">Endurance stations — PFT (${(p.tags||[]).includes("pft")?"T1":"T"})</p>
    <table class="refs">
      <tr><td>T1 — ${p.date.slice(8)}/${p.date.slice(5,7)}</td><td><b>${mmss(p.dureeMin)}</b></td></tr>
      <tr><td>Cible</td><td>sub-${mmss(cibleSec/60)}</td></tr>
      <tr><td>Coût</td><td>FC ${fmt(p.fcMoy,0)} moy / ${p.fcMax} max · RPE ${p.rpe}</td></tr>
    </table>
    <p class="muted" style="margin-top:8px">${proto}. <span class="pill ${ok?'ok':'warn'}">${verdict}</span></p>
  </div>`;
}

/* ---------- PAGE 6 : PLAN (timeline 8 phases) ---------- */
function renderPlan(){
  const cur = phaseActuelle();
  const tl = PHASES.map(p=>{
    const debut = J(p.debut);
    const fin = PHASES.find(x=>x.n===p.n+1);
    const finD = fin?J(fin.debut):RACE;
    const cls = p.n===cur.n ? "now" : (finD<=AUJ ? "done" : "");
    const d = `${p.debut.slice(8)}/${p.debut.slice(5,7)}`;
    return `<div class="tlp ${cls}">
      <span class="tln">${p.n}</span>
      <span class="tlname">${p.nom}</span>
      <span class="tldate">${d}</span></div>`;
  }).join("");
  return `
  <div class="card">
    <p class="lbl">Les 8 phases — où tu en es</p>
    <div class="tl">${tl}</div>
  </div>
  <div class="card">
    <p class="lbl">Focus phase ${cur.n} — ${cur.lieu}</p>
    <p class="muted">${cur.focus}</p>
  </div>
  <div class="card">
    <p class="lbl">Distribution d'intensité (recalé — audit)</p>
    <p class="muted">Ton limiteur = <b>seuil + durabilité</b>, pas le VO2max → le modèle optimal n'est pas « polarisé pur » mais <b>pyramidal en base (beaucoup de Z2 + densité seuil) puis polarisé au pic</b>. La science montre que le polarisé n'aide pas le seuil. Le Z2 reste le socle (durabilité + récup) ; le spécifique Hyrox vit en Z3-début Z4.</p>
  </div>
  <div class="card">
    <p class="lbl">Priorité audit — course compromise plus tôt</p>
    <p class="muted">C'est LE différenciateur (59% du temps de course = courir fatigué). À introduire <b>dès maintenant</b>, léger : « 500 m allure course → 1 station poids course → 500 m », <b>sans pause shake-out</b> (la pause détruit l'état compromis). Montée en charge Phases 5-7.</p>
  </div>
  <div class="card">
    <p class="lbl">Référence — Open Men Solo · nov. 2025</p>
    <table class="refs">
      <tr><td>FC moyenne course</td><td>${REFERENCE_OPEN.fcMoy} bpm</td></tr>
      <tr><td>Temps en Z4+</td><td>${REFERENCE_OPEN.pctZ4plus}%</td></tr>
      <tr><td>Charge (TRIMP)</td><td>${REFERENCE_OPEN.trimp}</td></tr>
      <tr><td>Dérive cardiaque (8 runs)</td><td>+${REFERENCE_OPEN.deriveBpm} bpm</td></tr>
    </table>
    <p class="muted" style="margin-top:8px">${REFERENCE_OPEN.notes}</p>
  </div>`;
}

/* ---------- PAGE : SEMAINE (cockpit de contrôle) ---------- */
function renderSemaine(){
  const b=bilanSemaine();
  const {lo,hi}=bornesSemaine();
  const dim=new Date(new Date(hi).getTime()-864e5).toISOString().slice(0,10);   // dimanche
  const lbl=x=>x.slice(8)+"/"+x.slice(5,7);

  // 1 · séances de la semaine, classées par stimulus réel
  const rows = b.ses.length ? b.ses.map(x=>{
    const dur=estDure(x.s);
    return `<div class="row"><span class="dot ${dur?"bad":"ok"}"></span>
      <span class="nm">${lbl(x.s.date)} · ${MOD[x.s.type]||x.s.type}${dur?" <small>· jour dur</small>":""}</span>
      <span class="pill">${CAT_LABEL[x.cat]}</span></div>`;
  }).join("") : `<p class="muted">Aucune séance loggée cette semaine.</p>`;

  // 2 · couverture vs template de phase
  const covOrder=["facile","seuil","compromise","force","recup"];
  const cov = covOrder.filter(c=>(b.tpl[c]||0)>0 || b.compte[c]>0).map(c=>{
    const cible=b.tpl[c]||0, fait=b.compte[c], ok=fait>=cible;
    return `<div class="row"><span class="dot ${ok?"ok":"warn"}"></span>
      <span class="nm">${CAT_LABEL[c]}</span>
      <span class="pill ${ok?"ok":"warn"}">${fait}/${cible}</span></div>`;
  }).join("");
  const trouTxt = b.trous.length
    ? b.trous.map(t=>CAT_LABEL[t.cat]+(t.manque>1?" ×"+t.manque:"")).join(" · ")
    : "aucun — semaine couverte";

  // 3 · signaux direction (réutilise les capteurs existants)
  const out=coursePoints("outdoor");
  const efTrend = out.length>=2 ? out[out.length-1].ef-out[out.length-2].ef : null;
  const efDot = efTrend==null?"warn":(efTrend>0.002?"ok":efTrend<-0.005?"bad":"warn");
  const efTxt = efTrend==null?"1 pt" : (efTrend>0?"+":"")+efTrend.toFixed(3);
  const dd=dernierDecouplage();
  const ddDot = !dd?"warn":(dd.decouplagePct<5?"ok":dd.decouplagePct<=8?"warn":"bad");
  const a=acwr(SESSIONS), acDot = !a.fiable?"warn":(a.ratio>=0.8&&a.ratio<=1.3?"ok":a.ratio>1.5?"bad":"warn");
  const p=pmc(SESSIONS);

  return `
  <div class="verdict">Semaine <b>${lbl(lo)} → ${lbl(dim)}</b> · phase ${b.ph.n} — ${b.ph.lieu}. ${b.tpl.note||""}</div>

  <div class="card">
    <p class="lbl">1 · Séances de la semaine <small style="color:var(--hint)">(classées par stimulus réel)</small></p>
    ${rows}
    <p class="muted" style="margin-top:8px">Le collectif (HIIT / renfo / fractionné) est rangé par ce qu'il a <b>réellement produit</b> (zone reine + tags), pas par son nom. Point rouge = jour dur (RPE≥8 ou ≥12 min en Z4+).</p>
  </div>

  <div class="card">
    <p class="lbl">2 · Couverture vs idéal — phase ${b.ph.n}</p>
    ${cov}
    <div class="row"><span class="dot ${b.exces?"bad":"ok"}"></span>
      <span class="nm">Jours durs <small>· à espacer</small></span>
      <span class="pill ${b.exces?"bad":"ok"}">${b.dursN}/${b.dursMax}</span></div>
    <p class="muted" style="margin-top:8px">Manque : <b>${trouTxt}</b>. ${b.exces?"⚠ Trop de jours durs — n'ajoute rien d'intense, espace-les et garde les faciles vraiment faciles.":"Charge dure sous le plafond de la phase."}</p>
  </div>

  <div class="card">
    <p class="lbl">3 · Direction — va-t-on dans le bon sens ?</p>
    <div class="row"><span class="dot ${efDot}"></span>
      <span class="nm">Économie (EF) <small>· doit monter à FC=</small></span>
      <span class="pill ${efDot}">${efTxt}</span></div>
    <div class="row"><span class="dot ${ddDot}"></span>
      <span class="nm">Durabilité <small>· découplage</small></span>
      <span class="pill ${ddDot}">${dd?fmt(dd.decouplagePct,1)+"%":"—"}</span></div>
    <div class="row"><span class="dot ${acDot}"></span>
      <span class="nm">Risque <small>· ACWR</small></span>
      <span class="pill ${acDot}">${a.fiable?fmt(a.ratio,2):"calib."}</span></div>
    <div class="row"><span class="dot ${p.fiable?(p.forme>=-15?"ok":"warn"):"warn"}"></span>
      <span class="nm">Fraîcheur <small>· TSB</small></span>
      <span class="pill">${p.fiable?fmt(p.forme,0):"amorçage"}</span></div>
    <p class="muted" style="margin-top:8px">Correction : EF stagne/baisse → + de facile, − d'intensité parasite · découplage > 5% → volume facile · ACWR > 1,5 → coupe le volume la semaine suivante · manque compromise → priorité (LE différenciateur).</p>
  </div>`;
}

/* --- mini-graphes SVG (offline, zéro dépendance) --- */
function efChartSVG(){
  const W=300,H=150,pad=28;
  const wk=[0,2,4,6,8,10,12,14];
  const lo=[1.149,1.156,1.162,1.169,1.176,1.182,1.189,1.195];
  const hi=[1.149,1.160,1.172,1.183,1.195,1.206,1.218,1.229];
  const outdoor = coursePoints("outdoor");
  const tapis = coursePoints("tapis");
  const all = [...outdoor,...tapis];
  const yMax=1.24;
  const yMin = all.length ? Math.min(1.05, Math.min(...all.map(p=>p.ef))-0.02) : 1.05;
  const X=w=>pad+(Math.max(0,Math.min(14,w))/14)*(W-pad-8);
  const Y=v=>H-22-((Math.max(yMin,Math.min(yMax,v))-yMin)/(yMax-yMin))*(H-22-8);
  const band=[...wk.map((w,i)=>`${X(w)},${Y(hi[i])}`),...wk.map((w,i)=>`${X(w)},${Y(lo[i])}`).reverse()].join(" ");
  const serie = (pts,col) => {
    const dots = pts.map(p=>`<circle cx="${X(p.week)}" cy="${Y(p.ef)}" r="4" fill="${col}"/>`).join("");
    const path = pts.length>1 ? `<polyline points="${pts.map(p=>`${X(p.week)},${Y(p.ef)}`).join(" ")}" fill="none" stroke="${col}" stroke-width="2"/>` : "";
    return path+dots;
  };
  // Couleurs EN DUR : les var(--x) ne se résolvent pas dans les attributs SVG de certains moteurs
  // → retombée en noir (invisible sur fond sombre). Outdoor = vert, tapis = orange.
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="150">
    <polygon points="${band}" fill="#2BD9D2" opacity="0.20"/>
    <line x1="${pad}" y1="${H-22}" x2="${W-8}" y2="${H-22}" stroke="#4A4F57"/>
    ${serie(tapis,"#FF7A1A")}
    ${serie(outdoor,"#2FD27A")}
    <text x="${pad}" y="${H-6}" font-size="10" fill="#C7CCD2">0</text>
    <text x="${W-14}" y="${H-6}" font-size="10" fill="#C7CCD2">14 sem</text>
    <text x="2" y="${Y(1.24)+4}" font-size="10" fill="#C7CCD2">1.24</text>
    <text x="2" y="${Y(yMin)}" font-size="10" fill="#C7CCD2">${yMin.toFixed(2)}</text>
  </svg>`;
}
function pmcChartSVG(p){
  const W=300,H=120,pad=24;
  const ctl=p.ctl, atl=p.atl, n=ctl.length;
  const all=[...ctl,...atl], max=Math.max(...all,1), min=Math.min(...all,0);
  const X=i=>pad+(i/(n-1||1))*(W-pad-8);
  const Y=v=>H-18-((v-min)/((max-min)||1))*(H-18-8);
  const line=arr=>arr.map((v,i)=>`${X(i)},${Y(v)}`).join(" ");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="120">
    <polyline points="${line(ctl)}" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <polyline points="${line(atl)}" fill="none" stroke="#FF7A1A" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="${pad}" y="${H-4}" font-size="10" fill="#C7CCD2">${p.series[0].day.slice(5)}</text>
    <text x="${W-30}" y="${H-4}" font-size="10" fill="#C7CCD2">${p.series[n-1].day.slice(5)}</text>
  </svg>
  <div class="zleg" style="margin-top:4px">
    <span><i style="background:#FFFFFF"></i>fitness (CTL)</span>
    <span><i style="background:#FF7A1A"></i>fatigue (ATL)</span></div>`;
}

/* --- navigation swipe + onglets --- */
const tabsEl = document.getElementById("tabs");
const swiper = document.getElementById("swiper");
const jRace = Math.max(0, Math.ceil((RACE - new Date())/864e5));
document.getElementById("brand").innerHTML = `<b>Hyrox Pro — Max</b> · J−${jRace} · phase ${phaseActuelle().n}`;
PAGES.forEach((pg,i)=>{
  document.getElementById(pg.id).innerHTML = pg.render();
  const b=document.createElement("button");
  b.className="tab"+(i===0?" on":""); b.textContent=pg.tab;
  b.onclick=()=>swiper.scrollTo({left:i*swiper.clientWidth,behavior:"smooth"});
  tabsEl.appendChild(b);
});
swiper.addEventListener("scroll",()=>{
  const i=Math.round(swiper.scrollLeft/swiper.clientWidth);
  [...tabsEl.children].forEach((t,k)=>t.classList.toggle("on",k===i));
  const at=tabsEl.children[i];
  if(at) tabsEl.scrollTo({left:at.offsetLeft-(tabsEl.clientWidth-at.clientWidth)/2,behavior:"smooth"});
},{passive:true});
</script>
